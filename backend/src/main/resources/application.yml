server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: czspig-product-critic
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/czspig_product_critic?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  anonymous-session-id: ${APP_ANONYMOUS_SESSION_ID:anonymous-dev-session}
  ai:
    provider: ${APP_AI_PROVIDER:auto}
    fallback-to-mock: ${APP_AI_FALLBACK_TO_MOCK:true}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:60}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:3000}
  temperature: ${DEEPSEEK_TEMPERATURE:0.6}
